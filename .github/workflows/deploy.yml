name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # --legacy-peer-deps because several deps (Radix, MUI, motion, etc.) still
      # declare React 18 in their peerDependencies but actually work with React 19.
      - run: npm install --legacy-peer-deps
      - run: npm run build
      # SPA fallback: GitHub Pages serves 404.html when no static file matches
      # the URL. Copy index.html → 404.html so unknown paths (e.g. /new) load
      # the app shell and let React Router handle client-side routing.
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
